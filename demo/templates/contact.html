{% extends 'base.html' %}
{% block 'main' %}

{% block 'title' %}Contact{% endblock %}

    <main class="container page-header">
        <div style="text-align: center; margin-bottom: 3rem;">
            <div class="badge" style="margin: 0 auto 1rem auto;">
                <div class="badge-dot"></div>
                Available for Service
            </div>
            <h2 class="section-title" style="margin-bottom: 1rem;">
                <span class="text-accent-light">LET'S</span> <span class="text-accent">TALK.</span>
            </h2>
            <p style="max-width: 600px; margin: 0 auto;">Have a project in mind, a question, or just want to say hi? I'm always open to discussing new opportunities.</p>
        </div>
        
        <div class="contact-container">
            <form id="contactForm">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="name" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Name</label>
                    <input type="text" id="name" class="form-control" required placeholder="user name">
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Email</label>
                    <input type="email" id="email" class="form-control" required placeholder="user@example.com">
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="message" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Message</label>
                    <textarea id="message" class="form-control" required placeholder="Tell me about your project..." style="min-height: 150px; resize: vertical;"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;"><i class="fas fa-paper-plane" style="margin-right: 8px;"></i> Send Message</button>
            </form>

            <div class="social-links" style="display: flex; justify-content: center; gap: 1.5rem; margin-top: 3rem;">
                <a href="#" target="_blank" aria-label="GitHub" style="width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: 0.3s;"><i class="fab fa-github"></i></a>
                <a href="#" target="_blank" aria-label="Twitter" style="width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: 0.3s;"><i class="fab fa-twitter"></i></a>
                <a href="#" target="_blank" aria-label="LinkedIn" style="width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: 0.3s;"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
    </main>
{% endblock %}
